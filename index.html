<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17324d">
  <meta name="description" content="유가담합 키워드 뉴스 전수 모니터링">
  <title>F-Issue Report</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script defer src="assets/js/app.js"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div>
        <p class="eyebrow">NEWS MONITORING</p>
        <h1>F-Issue Report</h1>
        <p class="subtitle">유가담합 키워드 뉴스 전수 모니터링</p>
      </div>
      <button id="refresh-button" class="refresh-button" type="button" aria-label="최신 데이터 새로고침">새로고침</button>
    </div>
  </header>

  <main class="page-shell">
    <section id="loading" class="panel loading-panel" aria-live="polite">리포트를 불러오는 중입니다…</section>
    <section id="error-panel" class="panel error-panel" hidden aria-live="assertive"></section>

    <div id="dashboard" hidden>
      <section id="today-notice" aria-live="polite"></section>

      <section class="report-heading" aria-labelledby="report-period-title">
        <div>
          <p id="report-slot" class="slot-label"></p>
          <h2 id="report-period-title"></h2>
          <p id="period-range" class="period-range"></p>
        </div>
        <p id="generated-at" class="generated-at"></p>
      </section>

      <section id="summary-root" aria-label="수집 현황 요약">
        <div id="summary-grid" class="summary-grid"></div>
        <div id="portal-summary" class="panel compact-panel" aria-label="포털별 수집 현황"></div>
      </section>

      <section id="report-selector-root" class="panel report-selector-root" aria-label="현재 날짜 리포트 선택"></section>

      <section id="report-root" class="article-section" aria-labelledby="articles-title">
        <div class="section-title-row">
          <div>
            <p class="eyebrow dark">FULL COVERAGE</p>
            <h2 id="articles-title">언론사별 전체 기사</h2>
          </div>
          <p class="section-note">정상·검토필요·제외 항목을 모두 표시합니다.</p>
        </div>
        <div id="article-groups"></div>
      </section>

      <section id="warnings-root" class="panel warning-section" aria-labelledby="warnings-title">
        <h2 id="warnings-title">Collection Warnings</h2>
        <div id="warnings-list"></div>
      </section>

      <section id="telegram-log-root" class="panel telegram-section" aria-labelledby="telegram-title">
        <h2 id="telegram-title">Telegram Alert Log</h2>
        <div id="telegram-log"></div>
      </section>

      <section id="calendar-root" class="panel calendar-section" aria-labelledby="calendar-title">
        <div class="calendar-header">
          <div>
            <p class="eyebrow dark">ARCHIVE</p>
            <h2 id="calendar-title">Calendar — 과거 기사 조회</h2>
          </div>
          <button id="calendar-today" class="secondary-button" type="button">이번 달</button>
        </div>
        <div class="calendar-controls">
          <button id="calendar-prev" type="button" aria-label="이전 달">‹ 이전 달</button>
          <strong id="calendar-month" aria-live="polite"></strong>
          <button id="calendar-next" type="button" aria-label="다음 달">다음 달 ›</button>
        </div>
        <div id="calendar-grid" class="calendar-grid" role="grid" aria-label="리포트 달력"></div>
        <div id="calendar-report-selector" class="calendar-report-selector" aria-live="polite"></div>
      </section>
    </div>
  </main>
  <footer>F-Issue Report · 공개 뉴스 검색 결과 기반</footer>
</body>
</html>
